name: Build Android APK and AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Install pnpm
      run: npm install -g pnpm
    
    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
    
    - name: Update package name
      run: sed -i 's/app.lovable.sleepflow/com.sleepflow/g' capacitor.config.ts
    
    - name: Add Android platform
      run: pnpm exec cap add android
    
    - name: Sync Capacitor
      run: pnpm exec cap sync android
    
    - name: Fix Java versions
      run: find node_modules/@capacitor -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_11/g' {} \;
    
    - name: Downgrade Gradle plugin
      run: sed -i "s/gradle:8.*/gradle:7.4.2'/g" android/build.gradle
    
    - name: Create keystore properties
      run: |
        cd android
        keytool -genkey -v -keystore sleepflow-upload.keystore -alias sleepflow-upload -keyalg RSA -keysize 2048 -validity 10000 -storepass "SleepFlow@Upload2026" -keypass "SleepFlow@Upload2026" -dname "CN=SleepFlow Upload, OU=Development, O=SleepFlow, L=Global, ST=Online, C=US"
    
    - name: Create keystore config
      run: |
        cd android
        echo "storeFile=sleepflow-upload.keystore" > keystore.properties
        echo "storePassword=SleepFlow@Upload2026" >> keystore.properties
        echo "keyAlias=sleepflow-upload" >> keystore.properties
        echo "keyPassword=SleepFlow@Upload2026" >> keystore.properties
    
    - name: Update package in gradle
      run: sed -i 's/app.lovable.sleepflow/com.sleepflow/g' android/app/build.gradle
    
    - name: Build APK
      run: cd android && ./gradlew clean assembleRelease
    
    - name: Build AAB
      run: cd android && ./gradlew bundleRelease
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sleepflow-apk
        path: android/app/build/outputs/apk/release/app-release.apk
    
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: sleepflow-aab
        path: android/app/build/outputs/bundle/release/app-release.aab
