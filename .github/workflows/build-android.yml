name: Build Android APK and AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Install pnpm
      run: npm install -g pnpm
    
    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile
    
    - name: Update package name to com.sleepflow
      run: |
        sed -i 's/"app.lovable.sleepflow"/"com.sleepflow"/g' capacitor.config.ts
    
    - name: Add Android platform
      run: pnpm exec cap add android
    
    - name: Sync Capacitor
      run: pnpm exec cap sync android
    
    - name: Fix Java version in Capacitor modules
      run: find node_modules/@capacitor -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_11/g' {} \;
    
    - name: Downgrade Android Gradle plugin
      run: |
        sed -i "s/classpath 'com.android.tools.build:gradle:.*'/classpath 'com.android.tools.build:gradle:7.4.2'/g" android/build.gradle
    
    - name: Generate signing keystore
      run: |
        cd android
        keytool -genkey -v -keystore sleepflow-upload.keystore -alias sleepflow-upload -keyalg RSA -keysize 2048 -validity 10000 -storepass "SleepFlow@Upload2026" -keypass "SleepFlow@Upload2026" -dname "CN=SleepFlow Upload, OU=Development, O=SleepFlow, L=Global, ST=Online, C=US"
        cat > keystore.properties << 'KEYSTORE'
storeFile=sleepflow-upload.keystore
storePassword=SleepFlow@Upload2026
keyAlias=sleepflow-upload
keyPassword=SleepFlow@Upload2026
KEYSTORE
    
    - name: Update app build.gradle with package name
      run: |
        sed -i 's/"app.lovable.sleepflow"/"com.sleepflow"/g' android/app/build.gradle
    
    - name: Build Release APK
      run: |
        cd android
        ./gradlew clean assembleRelease
    
    - name: Build Release AAB
      run: |
        cd android
        ./gradlew bundleRelease
    
    - name: Upload APK to artifacts
      uses: actions/upload-artifact@v3
      with:
        name: sleepflow-apk
        path: android/app/build/outputs/apk/release/app-release.apk
    
    - name: Upload AAB to artifacts
      uses: actions/upload-artifact@v3
      with:
        name: sleepflow-aab
        path: android/app/build/outputs/bundle/release/app-release.aab
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.0.0-${{ github.run_number }}
        release_name: SleepFlow Release v1.0.0
        body: |
          Automated build of SleepFlow Android app
          
          **Files:**
          - app-release.apk - Direct installation APK
          - app-release.aab - Google Play Store bundle
          
          Package: com.sleepflow
        draft: false
        prerelease: false
    
    - name: Upload APK to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: android/app/build/outputs/apk/release/app-release.apk
        asset_name: sleepflow-app-release.apk
        asset_content_type: application/vnd.android.package-archive
    
    - name: Upload AAB to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: android/app/build/outputs/bundle/release/app-release.aab
        asset_name: sleepflow-app-release.aab
        asset_content_type: application/octet-stream
